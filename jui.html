<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STEAMTOP - Пополнить Steam</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-white min-h-screen">


<nav class="bg-gray-800 shadow-lg">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex justify-between items-center">
        <a th:href="@{/topup}" class="text-2xl font-bold text-purple-500">STEAMTOP</a>
        <div class="flex items-center gap-8 text-sm font-medium">
            <a href="#" class="hover:text-purple-500 transition">ГЛАВНАЯ</a>
            <a href="#" class="hover:text-purple-500 transition">УСЛУГИ</a>
            <a th:href="@{/profile/{id}(id=${id})}" class="hover:text-purple-500 transition">ПРОФИЛЬ</a>
        </div>
    </div>
</nav>


<div class="max-w-6xl mx-auto mt-12 px-6">
    <div class="bg-gray-900 rounded-3xl p-8 shadow-2xl border border-gray-800">
        <div class="flex flex-col md:flex-row items-center gap-8">

            <div class="flex-shrink-0">
                <img src="img/steam-logo.png" alt="Steam" class="w-24 h-24">
            </div>

            <div class="flex-1">
                <h1 class="text-4xl font-bold mb-2">Пополнить Steam</h1>
                <p class="text-gray-400 mb-8">Быстро и безопасно</p>

                <form th:action="@{/topup}" th:object="${orderRequest}" method="post" class="space-y-6">


                    <div>
                        <label class="block text-sm text-gray-400 mb-2">Логин Steam</label>
                        <div>
                            <input type="text" th:field="*{info}"
                                   class="w-full bg-gray-800 border border-gray-700 rounded-2xl px-5 py-4 focus:outline-none focus:border-purple-500"
                                   placeholder="Введите логин Steam">
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <div>
                            <label class="block text-sm text-gray-400 mb-2">Сумма</label>
                            <input type="text" th:field="*{amount}"
                                   class=" w-full bg-gray-800 border border-gray-700 rounded-2xl px-5 py-4 focus:outline-none focus:border-purple-500"
                                   placeholder="0">

                        </div>

                        <div>
                            <label class="block text-sm text-gray-400 mb-2">Валюта</label>
                            <div class="flex gap-2">
                                <label class="flex-1">
                                    <input type="radio" name="currency" value="RUB" checked class="peer hidden">
                                    <div class="peer-checked:bg-purple-600 peer-checked:text-white bg-gray-800 border border-gray-700 rounded-2xl py-4 text-center cursor-pointer">
                                        ₽
                                    </div>
                                </label>
                                <label class="flex-1">
                                    <input type="radio" name="currency" value="KZT" checked class="peer hidden">
                                    <div class="peer-checked:bg-purple-600 peer-checked:text-white bg-gray-800 border border-gray-700 rounded-2xl py-4 text-center cursor-pointer">
                                        ₸
                                    </div>
                                </label>
                                <label class="flex-1">
                                    <input type="radio" name="currency" value="UAH" class="peer hidden">
                                    <div class="peer-checked:bg-purple-600 peer-checked:text-white bg-gray-800 border border-gray-700 rounded-2xl py-4 text-center cursor-pointer">
                                        ₴
                                    </div>
                                </label>
                            </div>
                        </div>
                    </div>


                    <button type="submit"
                            class="w-full bg-purple-600 hover:bg-purple-500 transition py-5 rounded-2xl font-bold text-lg">
                        ОПЛАТИТЬ + сумма в рублях с комиссией
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>


<div class="max-w-6xl mx-auto mt-16 px-6">
    <h2 class="text-2xl font-bold mb-8">Популярные игры</h2>
    <div class="grid grid-cols-2 md:grid-cols-4 gap-6">
        <div class="bg-gray-900 rounded-3xl overflow-hidden group">
            <img src="img/game1.jpg" class="w-full h-56 object-cover group-hover:scale-105 transition">
            <div class="p-4">
                <h3 class="font-semibold">Название игры</h3>
                <p class="text-cyan-400">1 250 ₽</p>
            </div>
        </div>
    </div>
</div>
<div id="orderModal"
     class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
    <div class="bg-gray-900 rounded-3xl p-8 max-w-md w-full mx-4 text-center border border-gray-700 shadow-2xl">
        <div id="successIcon" class="hidden mx-auto mb-4 w-16 h-16 bg-green-500/10 text-green-500 rounded-2xl flex items-center justify-center text-4xl">✅</div>
        <div id="errorIcon" class="hidden mx-auto mb-4 w-16 h-16 bg-red-500/10 text-red-500 rounded-2xl flex items-center justify-center text-4xl">❌</div>
        <h2 id="modalTitle" class="text-2xl font-bold mb-2"></h2>
        <p id="modalMessage" class="text-gray-400 mb-8"></p>

        <button onclick="closeModal()"
                class="w-full bg-cyan-600 hover:bg-cyan-500 py-4 rounded-2xl font-bold text-lg transition">
            Хорошо
        </button>
    </div>
</div>

<script th:inline="javascript">
    window.onload = function() {
        const successMsg = /*[[${success}]]*/ '';
        const errorMsg = /*[[${error}]]*/ '';

        const modal = document.getElementById('orderModal');

        if (successMsg) {
            document.getElementById('successIcon').classList.remove('hidden');
            document.getElementById('modalTitle').textContent = 'Успешно!';
            document.getElementById('modalMessage').innerHTML = successMsg;
            modal.classList.remove('hidden');
        }
        else if (errorMsg) {
            document.getElementById('errorIcon').classList.remove('hidden');
            document.getElementById('modalTitle').textContent = 'Ошибка';
            document.getElementById('modalMessage').innerHTML = errorMsg;
            modal.classList.remove('hidden');
        }
    };

    function closeModal() {
        document.getElementById('orderModal').classList.add('hidden');
    }
</script>
</body>
</html>
