<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация — STEAMTOP</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen flex items-center justify-center">

<div class="w-full max-w-md p-8 space-y-8 bg-gray-800 rounded-xl shadow-2xl border border-gray-700">
    <div class="text-center">
        <h1 class="text-4xl font-bold text-purple-500">STEAMTOP</h1>
        <p class="mt-2 text-gray-400">Создайте новый аккаунт</p>
    </div>

    <div th:if="${error}" class="p-4 bg-red-900/50 border border-red-700 rounded-lg text-red-300 text-center" th:text="${error}"></div>
    <div th:if="${success}" class="p-4 bg-green-900/50 border border-green-700 rounded-lg text-green-300 text-center" th:text="${success}"></div>

    <form th:action="@{/register}" method="post" class="mt-8 space-y-6">
        <div class="rounded-md shadow-sm -space-y-px">
            <div>
                <label for="username" class="sr-only">Логин</label>
                <input id="username" name="username" type="text" required autofocus
                       class="appearance-none rounded-t-md relative block w-full px-3 py-3 border border-gray-600 bg-gray-700 placeholder-gray-500 text-gray-100 focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-purple-500 focus:z-10 sm:text-sm"
                       placeholder="Придумайте логин">
            </div>
            <div>
                <label for="password" class="sr-only">Пароль</label>
                <input id="password" name="password" type="password" required
                       class="appearance-none rounded-b-md relative block w-full px-3 py-3 border border-gray-600 bg-gray-700 placeholder-gray-500 text-gray-100 focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-purple-500 focus:z-10 sm:text-sm"
                       placeholder="Придумайте пароль">
            </div>
        </div>


        <div>
            <button type="submit"
                    class="group relative w-full flex justify-center py-3 px-4 border border-transparent text-sm font-medium rounded-md text-white bg-purple-600 hover:bg-purple-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-purple-500 transition duration-150">
                Зарегистрироваться
            </button>
        </div>
    </form>

    <div class="text-center text-sm">
        <a th:href="@{/login}" class="font-medium text-purple-400 hover:text-purple-300 transition">
            Уже есть аккаунт? Войти
        </a>
    </div>
</div>

</body>
</html>
