<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профиль — STEAMTOP</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen">

<header class="bg-gray-800 shadow-lg">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex justify-between items-center">
        <h1 class="text-2xl font-bold text-purple-500">STEAMTOP</h1>
        <h1 th:text="${testMessage}"></h1>
        <div class="flex items-center space-x-4">
            <span class="text-gray-300">Привет, <strong th:text="${username}"></strong></span>
            <a th:href="@{/logout}"
               class="px-4 py-2 bg-red-600 hover:bg-red-700 rounded-md text-white text-sm font-medium transition">
                Выйти
            </a>
        </div>
    </div>
</header>

<main class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
    <div class="bg-gray-800 rounded-xl shadow-2xl p-8 border border-gray-700">
        <h2 class="text-3xl font-bold mb-6 text-purple-400">Ваш профиль</h2>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div>
                <div class="bg-gray-700 rounded-lg p-6">
                    <h3 class="text-xl font-semibold mb-4">Баланс</h3>
                    <p class="text-4xl font-bold text-green-400">
                        <span th:text="${count}"></span> ₽
                    </p>
                    <p class="text-sm text-gray-400 mt-2">Доступно для пополнения Steam</p>
                </div>
            </div>

            <div>
                <div class="bg-gray-700 rounded-lg p-6">
                    <h3 class="text-xl font-semibold mb-4">Быстрые действия</h3>
                    <ul class="space-y-3">
                        <li><a href="#" class="text-purple-400 hover:text-purple-300">Пополнить баланс</a></li>
                        <li><a href="#" class="text-purple-400 hover:text-purple-300">История операций</a></li>
                        <li><a href="#" class="text-purple-400 hover:text-purple-300">Настройки аккаунта</a></li>
                    </ul>
                </div>
            </div>
        </div>

        <!-- Место для будущей таблицы заказов / истории -->
        <div class="mt-10">
            <h3 class="text-2xl font-semibold mb-4">Последние операции</h3>
            <p class="text-gray-400">Здесь скоро появится история пополнений...</p>
        </div>
    </div>
</main>

</body>
</html>
